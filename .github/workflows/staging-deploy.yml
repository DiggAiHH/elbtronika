name: Staging Deploy

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elbtronika/web typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm audit --audit-level high
        continue-on-error: true

  build:
    name: Build Staging
    runs-on: ubuntu-latest
    needs: checks
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Build with Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: doppler run -- pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: apps/web/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.elbtronika.art
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Build with Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: doppler run -- pnpm build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Staging
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
        run: |
          doppler run -- netlify deploy \
            --prod \
            --dir=apps/web/.next \
            --site=${{ secrets.NETLIFY_STAGING_SITE_ID }} \
            --message="Staging deploy: ${{ github.sha }}"

  smoke-tests:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Wait for deploy propagation
        run: sleep 30
      - name: Smoke test — Health endpoint
        run: curl -sf https://staging.elbtronika.art/api/health || exit 1
      - name: Smoke test — Key pages
        run: |
          curl -sf https://staging.elbtronika.art/ || exit 1
          curl -sf https://staging.elbtronika.art/shop || exit 1
          curl -sf https://staging.elbtronika.art/gallery || exit 1
