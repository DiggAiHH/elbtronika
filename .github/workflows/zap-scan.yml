name: OWASP ZAP Security Scan

on:
  push:
    branches: [main, staging]
  schedule:
    # Run weekly on Sundays at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: false
        default: ""

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan (Staging)
        if: github.ref == 'refs/heads/staging' || inputs.target_url == ''
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://staging.elbtronika.art"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          issue_title: "ZAP Baseline Scan — Staging"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false

      - name: ZAP Baseline Scan (Production)
        if: github.ref == 'refs/heads/main' && inputs.target_url == ''
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://elbtronika.art"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          issue_title: "ZAP Baseline Scan — Production"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false

      - name: ZAP Baseline Scan (Custom URL)
        if: inputs.target_url != ''
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          issue_title: "ZAP Baseline Scan — Custom"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_*.html
          retention-days: 30

  zap-api:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    needs: zap-baseline
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          target: "https://elbtronika.art/api"
          format: "openapi"
          cmd_options: "-a"
          issue_title: "ZAP API Scan"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false

      - name: Upload ZAP API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-report
          path: report_*.html
          retention-days: 30
